name: release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nome: jqc-windows-x64-cpu.exe
            features: ""
          - os: windows-latest
            nome: jqc-windows-x64-vulkan.exe
            features: vulkan
          - os: ubuntu-latest
            nome: jqc-linux-x64-cpu
            features: ""
          - os: ubuntu-latest
            nome: jqc-linux-x64-vulkan
            features: vulkan
          - os: macos-latest
            nome: jqc-macos-arm64
            features: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # SDK LunarG completo: o backend Vulkan do llama.cpp compila shaders com
      # o glslc (Shaderc), que a action de componentes avulsos nao fornece —
      # foi exatamente o erro do primeiro release ("missing: glslc").
      - name: Vulkan SDK
        if: matrix.features == 'vulkan'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          cache: true
      # O gerador Visual Studio corre os passos do ExternalProject
      # vulkan-shaders-gen fora de ordem (install antes do build terminar);
      # Ninja serializa as dependencias corretamente. Precisa do cl.exe no
      # PATH, dai o msvc-dev-cmd.
      - name: MSVC no PATH (ninja)
        if: matrix.features == 'vulkan' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Gerador Ninja no vulkan Windows
        if: matrix.features == 'vulkan' && runner.os == 'Windows'
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"
      # pwsh, nao bash: o Git Bash poe /usr/bin na frente do PATH e o link.exe
      # do coreutils sombreia o linker da MSVC quando o ambiente dev esta ativo.
      - name: Build (vulkan no Windows)
        if: matrix.features == 'vulkan' && runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --features vulkan
      - name: Build
        if: ${{ !(matrix.features == 'vulkan' && runner.os == 'Windows') }}
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --features "${{ matrix.features }}"
          else
            cargo build --release
          fi
      - name: Renomear e sha256
        shell: bash
        run: |
          fonte=target/release/jqc
          [ -f "$fonte.exe" ] && fonte="$fonte.exe"
          cp "$fonte" "${{ matrix.nome }}"
          python3 -c "import hashlib,sys; print(hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest(), sys.argv[1])" "${{ matrix.nome }}" > "${{ matrix.nome }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome }}
          path: |
            ${{ matrix.nome }}
            ${{ matrix.nome }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            jqc-*
